name: Mise a jour BRVM Aliou

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les outils
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pandas_ta

      - name: Lancer l'analyse Sika Finance
        run: python update_data.py

      - name: Sauvegarder les changements
        run: |
          git config --global user.name 'Aliou-Bot'
          git config --global user.email 'bot@github.com'
          git add data.json
          git commit -m "MAJ Automatique des graphiques BRVM" || echo "Pas de changements"
          git push
