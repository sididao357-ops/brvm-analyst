name: Mise a jour BRVM Aliou
on:
  schedule:
    - cron: '30 16 * * *' # Se lance tous les jours à 16h30 UTC
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installer les outils
        run: pip install -r requirements.txt

      - name: Lancer l'analyse Sika Finance
        run: python update_data.py

      - name: Sauvegarder les changements
        run: |
          git config --global user.name 'Aliou-Bot'
          git config --global user.email 'aliou@bot.com'
          git add data.json
          git commit -m "MAJ Automatique des graphiques BRVM" || exit 0
          git push
